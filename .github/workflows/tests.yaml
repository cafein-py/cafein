name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python linters
        run: pip install black flake8
      - name: black
        run: black --check python/cafein tests
      - name: flake8
        run: flake8 python/cafein tests
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    env:
      CAFEIN_REQUIRE_TEST_DATA: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["310", "311", "312", "313", "314"]
    steps:
      - uses: actions/checkout@v4
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: ci/py${{ matrix.python }}-conda.yaml
          environment-name: test
          condarc: |
            channel_priority: strict
      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: tests/data
          key: test-data-${{ hashFiles('scripts/fetch_test_data.py') }}
      - name: Fetch test data
        shell: bash -el {0}
        run: python scripts/fetch_test_data.py
      - name: Run Rust tests
        shell: bash -el {0}
        run: cargo test --workspace
      # Dependencies install separately with default build isolation:
      # pyrosm's cykhash ships no wheels and needs Cython to build, which
      # --no-build-isolation would hide.
      - name: Install Python dependencies
        shell: bash -el {0}
        run: pip install geopandas numpy pandas pyrosm scipy shapely
      - name: Install cafein
        shell: bash -el {0}
        run: pip install -e . --no-build-isolation
      - name: Run Python tests
        shell: bash -el {0}
        run: pytest --cov=cafein --cov-report=term-missing
